name: Auto Update DBD Personal Stats

on:
  schedule:
    # Esegue l'aggiornamento automatico ogni giorno alle 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch: # Permette di avviarlo a mano quando vuoi

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Copia il codice nel server virtuale
      uses: actions/checkout@v4

    - name: Configura Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installa le librerie necessarie
      run: pip install requests beautifulsoup4

    - name: Esegui lo script
      run: python fetch_stats.py
      env:
        DBD_COOKIE: ${{ secrets.DBD_COOKIE }}

    - name: Salva il file JSON aggiornato nel repository
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add stats.json
        git commit -m "Aggiornamento automatico statistiche DBD" || exit 0
        git push
